<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>bio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111110;
      --text: #f0ede8;
      --muted: #666;
      --card: #1c1c1a;
      --border: #2a2a27;
      --accent: #f0ede8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 20px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Avatar */
    .avatar-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #2a2a27;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      overflow: hidden;
      border: 2px solid var(--border);
    }

    .avatar-wrap svg {
      width: 44px;
      height: 44px;
      opacity: 0.4;
    }

    /* Name & bio */
    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .bio {
      font-size: 0.95rem;
      color: #b0aca6;
      text-align: center;
      line-height: 1.6;
      font-weight: 300;
      max-width: 340px;
      margin-bottom: 16px;
    }

    .bio-divider {
      border: none;
      border-top: 1px solid #2a2a27;
      width: 60px;
      margin: 10px auto 12px;
    }

    /* Divider */


    /* Social links */


    .links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .link-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease;

      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow:
        0 1px 1px rgba(255,255,255,0.06) inset,
        0 4px 16px rgba(0,0,0,0.4),
        0 1px 0 rgba(255,255,255,0.04) inset;
    }

    /* Inner subtle glow */
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, transparent 55%);
      pointer-events: none;
    }

    .link-btn:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow:
        0 1px 1px rgba(255,255,255,0.08) inset,
        0 8px 28px rgba(0,0,0,0.5),
        0 1px 0 rgba(255,255,255,0.06) inset;
      border-color: rgba(255,255,255,0.16);
    }

    .link-btn:active {
      transform: scale(0.97);
    }

    .link-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .link-icon svg { width: 20px; height: 20px; }

    /* Very subtle tint per brand — dark, not saturated */
    .tg { background: rgba(42,171,238,0.09);  border-color: rgba(42,171,238,0.18); }
    .gh { background: rgba(200,210,220,0.07);  border-color: rgba(200,210,220,0.13); }
    .dc { background: rgba(88,101,242,0.10);   border-color: rgba(88,101,242,0.2); }
    .st { background: rgba(180,195,210,0.07);  border-color: rgba(180,195,210,0.13); }

/* Stagger animations */

    /* Lang toggle */
    .lang-toggle {
      display: flex;
      gap: 4px;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.04) 100%);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 4px;
      margin-bottom: 14px;
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 -1px 0 rgba(0,0,0,0.1);
    }

    .lang-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 5px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .lang-btn.active {
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.08) 100%);
      color: var(--text);
      box-shadow:
        0 2px 6px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.1);
    }

    .lang-btn:hover:not(.active) {
      color: #aaa;
    }


    /* Avatar row with side icons */
    .avatar-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      margin-bottom: 14px;
    }

    .avatar-row .avatar-wrap {
      margin-bottom: 0;
    }

    .avatar-row .side-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Starfield */

    #starfield {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      overflow: visible;
    }
    .name-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-bottom: 12px;
    }

    .name-row .name {
      margin-bottom: 0;
    }

    .name-row .links:first-child {
      position: absolute;
      left: 0;
    }




    .side-icons {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .side-icons.left { left: calc(50% - 270px); }
    .side-icons.right { right: calc(50% - 270px); }
    /* Greeting */
    .greeting {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: #d0ccc6;
      margin-bottom: 16px;
      height: 40px;
      width: 100%;
      position: relative;
    }

    .greeting-word {
      display: block;
      position: absolute;
      width: 100%;
      text-align: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .greeting-word.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .greeting-word.hidden-up {
      opacity: 0;
      transform: translateY(-10px);
    }
  </style>
<link rel="icon" type="image/png" href="https://i.ibb.co/sdzDD332/Adobe-Express-file.png">
</head>
<body>
<canvas id="starfield"></canvas>
<div class="container">
  <div class="greeting">
    <span class="greeting-word visible" id="greet-0">Привет!</span>
    <span class="greeting-word hidden-up" id="greet-1">Hello!</span>
  </div>

  <div class="avatar-row">
    <!-- Left icons: Telegram + GitHub -->
    <div class="side-links">
      <a href="https://t.me/anthr0p1c" class="link-btn tg" target="_blank" rel="noopener" title="Telegram">
        <span class="link-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21.944 2.506a1.5 1.5 0 0 0-1.538-.213L2.5 9.5c-1.054.44-1.047 1.516-.052 1.895l4.[...]</svg></span>
      </a>
      <a href="https://github.com/kov-qa" class="link-btn gh" target="_blank" rel="noopener" title="GitHub">
        <span class="link-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.483[...]</svg></span>
      </a>
    </div>

    <div class="avatar-wrap">
    <img src="https://i.ibb.co/TBhtjQq6/photo-2026-04-30-07-23-17.jpg" alt="avatar" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;" />
    </div>

    <!-- Right icons: Discord + Steam -->
    <div class="side-links">
      <a href="https://discord.com/users/966020915525718056" class="link-btn dc" target="_blank" rel="noopener" title="Discord">
        <span class="link-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.[...]</svg></span>
      </a>
      <a href="https://steamcommunity.com/id/kovritov/" class="link-btn st" target="_blank" rel="noopener" title="Steam">
        <span class="link-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.0[...]</svg></span>
      </a>
    </div>
  </div>

  <div class="name-row">
    <h1 class="name">@kovritov</h1>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <p class="bio" id="bio-header" style="margin-bottom:0">Основной язык: Русский · Английский (B1/B2)<br>Место проживания: Россия, Красноярс�[...]</p>
  <hr class="bio-divider">
  <p class="bio" id="bio-text">Тестер, симрейсер и вайбкодер. В данный момент в активных поисках работы как вайбкодер/тести[...]</p>

</div><!-- /.container -->

<script>
  const bio = {
    ru: {
      header: "Основной язык: Русский · Английский (B1/B2)<br>Место проживания: Россия, Красноярский край, Красноярск",
      body: "Тестер, симрейсер и вайбкодер. В данный момент в активных поисках работы как вайбкодер/тестировщик в л[...]
    },
    en: {
      header: "Native: Russian · English (B1/B2)<br>Location: Russia, Krasnoyarsk Krai, Krasnoyarsk",
      body: "Tester, sim racer and vibe coder. Currently actively looking for a job as a vibe coder/tester in any IT or non-IT company. Worked at 3 major Roblox companies, including Voldex and DO BIG [...]
    }
  };

  function setLang(lang) {
    document.getElementById('bio-header').innerHTML = bio[lang].header;
    document.getElementById('bio-text').innerHTML = bio[lang].body;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  }

  // Auto-switching greeting
  let greetIdx = 0;
  const greetEls = [document.getElementById('greet-0'), document.getElementById('greet-1')];

  if (greetEls[0] && greetEls[1]) setInterval(() => {
    const current = greetEls[greetIdx];
    greetIdx = (greetIdx + 1) % 2;
    const next = greetEls[greetIdx];

    // Fade out current
    current.style.opacity = '0';
    current.style.transform = 'translateY(-8px)';

    // Prepare next below
    next.style.transition = 'none';
    next.style.opacity = '0';
    next.style.transform = 'translateY(8px)';

    setTimeout(() => {
      next.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      next.style.opacity = '1';
      next.style.transform = 'translateY(0)';
    }, 400);
  }, 2500);

  // Starfield
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const STAR_COUNT = 350;
  const stars = Array.from({ length: STAR_COUNT }, () => ({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.2 + 0.2,
    alpha: Math.random() * 0.6 + 0.4,
    dx: (Math.random() - 0.5) * 0.15,
    dy: -(Math.random() * 0.4 + 0.1),
    twinkleSpeed: Math.random() * 0.01 + 0.005,
    twinkleOffset: Math.random() * Math.PI * 2
  }));

  let frame = 0;
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    stars.forEach(s => {
      s.x += s.dx;
      s.y += s.dy;
      if (s.x < 0) s.x = canvas.width;
      if (s.x > canvas.width) s.x = 0;
      if (s.y < 0) s.y = canvas.height;
      if (s.y > canvas.height) s.y = 0;

      const twinkle = s.alpha * (0.7 + 0.3 * Math.sin(frame * s.twinkleSpeed + s.twinkleOffset));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
</script>
</body>
</html>
